name: Terraform CI

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main

jobs:
  terraform:
    name: Terraform Validate and Plan
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: Terraform fmt
        run: |
          terraform fmt -check -diff

      - name: Terraform init
        run: |
          terraform init -backend=false

      - name: Terraform validate
        run: |
          terraform validate

      - name: Terraform plan
        if: github.event_name != 'pull_request' || github.base_ref == 'dev' || github.base_ref == 'main'
        run: |
          if [ "${{ github.ref_name }}" = "dev" ]; then
            terraform workspace select dev || terraform workspace new dev
            terraform plan -var-file=environments/dev/terraform.tfvars -out=tfplan
          elif [ "${{ github.ref_name }}" = "main" ]; then
            terraform workspace select prod || terraform workspace new prod
            terraform plan -var-file=environments/prod/terraform.tfvars -out=tfplan
          else
            echo "No plan for branch ${GITHUB_REF_NAME}."
          fi

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform
    if: github.ref_name == 'dev' || github.ref_name == 'main'
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: Terraform init
        run: |
          terraform init

      - name: Terraform apply
        run: |
          if [ "${{ github.ref_name }}" = "dev" ]; then
            terraform workspace select dev
            terraform apply -auto-approve tfplan
          elif [ "${{ github.ref_name }}" = "main" ]; then
            terraform workspace select prod
            terraform apply -auto-approve tfplan
          else
            echo "Skipping apply on branch ${GITHUB_REF_NAME}."
          fi
